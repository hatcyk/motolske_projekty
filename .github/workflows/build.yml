name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Vytvoří GitHub Release jako první ──────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: "Domácí úkoly SPŠD ${{ github.ref_name }}"
          body: |
            ## 📦 Domácí úkoly z Pythonu — ${{ github.ref_name }}

            ### Stažení
            | Platforma | Soubor |
            |-----------|--------|
            | 🍎 macOS  | `.dmg` |
            | 🪟 Windows | `.exe` (installer) |
            | 🐧 Linux  | `.AppImage` |

            ### Instalace
            - **macOS** — otevři `.dmg`, přetáhni do Applications
            - **Windows** — spusť `.exe`, projdi průvodcem
            - **Linux** — `chmod +x *.AppImage && ./DomáciÚkoly*.AppImage`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Parallelní build pro každou platformu ──────────────────────
  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
